name: Test Template

on:
  workflow_call:
    inputs:
      shard:
        required: true
        type: number
      totalShards:
        required: true
        type: number

jobs:
  test:
    name: Shard ${{ inputs.shard }} of ${{ inputs.totalShards }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install Node.js dependencies
        run: pnpm i

      - name: Run tests
        run: pnpm exec vitest --shard=${{ inputs.shard }}/${{ inputs.totalShards }} --no-isolate ${{ !runner.debug && '--silent' || '' }}
