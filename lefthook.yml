pre-commit:
  commands:
    prettier:
      glob: "*.{js,jsx,ts,tsx}"
      run: npx prettier --write {staged_files}
      priority: 1
      stage_fixed: true
      skip:
        - merge
        - rebase
    biome-lint:
      run: npx biome check --write --reporter=summary --staged --no-errors-on-unmatched
      stage_fixed: true
      priority: 2
      skip:
        - merge
        - rebase

pre-push:
  commands:
    biome-lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: npx biome ci --changed --no-errors-on-unmatched --diagnostic-level=error {push_files}

post-merge:
  commands:
    update-submodules:
      run: git submodule update --init --recursive
