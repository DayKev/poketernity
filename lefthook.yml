skip_lfs: true

pre-commit:
  commands:
    biome-lint:
      run: pnpm exec biome check --write --reporter=summary --staged --no-errors-on-unmatched
      stage_fixed: true
      skip:
        - merge
        - rebase

pre-push:
  commands:
    biome-lint:
      run: pnpm exec biome ci --changed --no-errors-on-unmatched --diagnostic-level=error

post-merge:
  commands:
    update-submodules:
      run: git submodule update --init --recursive
    update-packages:
      run: pnpm i --ignore-scripts

post-checkout:
  commands:
    update-packages:
      run: pnpm i --ignore-scripts
